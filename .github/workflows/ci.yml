name: Non-Codex verification

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: npx --yes pnpm@11.9.0 install --frozen-lockfile
      - run: npx --yes pnpm@11.9.0 typecheck
      - run: npx --yes pnpm@11.9.0 test
      - run: npx --yes pnpm@11.9.0 build
      - run: npx --yes pnpm@11.9.0 secret-scan
